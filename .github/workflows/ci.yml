name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m pytest backend/app/tests

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt

      - name: Run worker tests
        env:
          PYTHONPATH: worker
          DEEPFACE_ANTI_SPOOFING: "false"
        run: python -m pytest worker/app/tests

  frontend-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/user/package-lock.json
            frontend/admin/package-lock.json

      - name: Build user frontend
        working-directory: frontend/user
        run: |
          npm ci
          npm run build

      - name: Build admin frontend
        working-directory: frontend/admin
        env:
          VITE_BASE_PATH: /admin/
        run: |
          npm ci
          npm run build

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image names
        run: |
          IMAGE_PREFIX="ghcr.io/${GITHUB_REPOSITORY}"
          IMAGE_PREFIX="$(echo "$IMAGE_PREFIX" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_PREFIX=$IMAGE_PREFIX" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build backend image
        run: |
          docker build \
            -t deepface-backend:test \
            -t "$IMAGE_PREFIX/backend:$IMAGE_TAG" \
            -t "$IMAGE_PREFIX/backend:latest" \
            backend

      - name: Build worker image
        run: |
          docker build \
            -t deepface-worker:test \
            -t "$IMAGE_PREFIX/worker:$IMAGE_TAG" \
            -t "$IMAGE_PREFIX/worker:latest" \
            worker

      - name: Build user frontend image
        run: |
          docker build \
            -t deepface-frontend-user:test \
            -t "$IMAGE_PREFIX/frontend-user:$IMAGE_TAG" \
            -t "$IMAGE_PREFIX/frontend-user:latest" \
            frontend/user

      - name: Build admin frontend image
        run: |
          docker build \
            -t deepface-frontend-admin:test \
            -t "$IMAGE_PREFIX/frontend-admin:$IMAGE_TAG" \
            -t "$IMAGE_PREFIX/frontend-admin:latest" \
            frontend/admin

      - name: Publish images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "$IMAGE_PREFIX/backend:$IMAGE_TAG"
          docker push "$IMAGE_PREFIX/backend:latest"
          docker push "$IMAGE_PREFIX/worker:$IMAGE_TAG"
          docker push "$IMAGE_PREFIX/worker:latest"
          docker push "$IMAGE_PREFIX/frontend-user:$IMAGE_TAG"
          docker push "$IMAGE_PREFIX/frontend-user:latest"
          docker push "$IMAGE_PREFIX/frontend-admin:$IMAGE_TAG"
          docker push "$IMAGE_PREFIX/frontend-admin:latest"
