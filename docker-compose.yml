services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deepface_access
      POSTGRES_USER: deepface
      POSTGRES_PASSWORD: deepface
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://deepface:deepface@database:5432/deepface_access
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data/smoke:/app/data/smoke
    ports:
      - "8000:8000"
    depends_on:
      - database
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend-user:
    build:
      context: ./frontend/user
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

  frontend-admin:
    build:
      context: ./frontend/admin
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5174:5174"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5174

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: postgresql://deepface:deepface@database:5432/deepface_access
      REDIS_URL: redis://redis:6379/0
      DEEPFACE_MODEL_NAME: Facenet512
      DEEPFACE_DETECTOR_BACKEND: opencv
      DEEPFACE_ENFORCE_DETECTION: "true"
      DEEPFACE_ALIGN: "true"
      DEEPFACE_NORMALIZATION: base
      DEEPFACE_MATCH_THRESHOLD: "0.70"
      DEEPFACE_ANTI_SPOOFING: "false"
    volumes:
      - ./data/smoke:/app/data/smoke
    depends_on:
      - database
      - redis
    command: python -m app.main

volumes:
  postgres_data:
