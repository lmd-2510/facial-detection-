<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepFace Access</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #146b52;
        --accent-strong: #0d4d3c;
        --sidebar: #17382f;
        --cyan: #55eadb;
        --cyan-soft: #bce8d8;
        --ink: #f4fbf8;
        --muted: #b7cbc2;
        --panel: rgba(23, 56, 47, 0.9);
        --panel-line: rgba(188, 232, 216, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: "Segoe UI", "Aptos", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(188, 232, 216, 0.2), transparent 34%),
          repeating-linear-gradient(
            90deg,
            rgba(238, 244, 240, 0.08) 0,
            rgba(238, 244, 240, 0.08) 1px,
            transparent 1px,
            transparent 38px
          ),
          radial-gradient(circle at 52% 5%, rgba(188, 232, 216, 0.42), transparent 26%),
          radial-gradient(circle at 16% 52%, rgba(20, 107, 82, 0.58), transparent 25%),
          linear-gradient(105deg, #082d28 0%, #0d4d3c 43%, #0b352d 72%, #031713 100%);
        background-size:
          160% 160%,
          38px 100%,
          130% 130%,
          140% 140%,
          100% 100%;
        animation: background-flow 14s ease-in-out infinite alternate;
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
      }

      body::before {
        background:
          linear-gradient(98deg, transparent 0 17%, rgba(188, 232, 216, 0.08) 17% 83%, transparent 83%),
          linear-gradient(90deg, rgba(3, 23, 19, 0.52), transparent 26%, transparent 75%, rgba(3, 23, 19, 0.58));
        animation: panel-light 9s ease-in-out infinite alternate;
      }

      body::after {
        opacity: 0.36;
        background-image:
          radial-gradient(circle, rgba(174, 255, 249, 0.64) 0 2px, transparent 3px),
          radial-gradient(circle, rgba(174, 255, 249, 0.38) 0 1px, transparent 2px);
        background-position:
          8vw 30vh, 13vw 74vh, 28vw 8vh, 79vw 9vh, 98vw 82vh,
          45vw 92vh, 11vw 14vh, 71vw 48vh;
        background-size: 100vw 100vh;
        background-repeat: no-repeat;
        animation: particle-drift 18s linear infinite alternate;
      }

      @keyframes background-flow {
        0% {
          background-position:
            0% 0%,
            0 0,
            48% 0%,
            12% 52%,
            0 0;
        }

        100% {
          background-position:
            100% 28%,
            38px 0,
            58% 8%,
            20% 44%,
            0 0;
        }
      }

      @keyframes panel-light {
        0% {
          opacity: 0.78;
          transform: translateX(-16px);
        }

        100% {
          opacity: 1;
          transform: translateX(18px);
        }
      }

      @keyframes particle-drift {
        0% {
          transform: translate3d(0, 0, 0);
        }

        100% {
          transform: translate3d(18px, -14px, 0);
        }
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 40px 20px;
      }

      .home-panel {
        width: min(1150px, 100%);
        border: 1px solid var(--panel-line);
        border-radius: 8px;
        padding: clamp(28px, 4vw, 52px);
        background: var(--panel);
        box-shadow: 0 30px 90px rgba(3, 23, 19, 0.44);
        backdrop-filter: blur(10px);
      }

      .bot-mark {
        display: grid;
        width: 92px;
        height: 92px;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(85, 234, 219, 0.46);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(85, 234, 219, 0.16), rgba(188, 232, 216, 0.08)),
          rgba(20, 107, 82, 0.18);
      }

      .bot-face {
        position: relative;
        width: 60px;
        height: 60px;
        overflow: hidden;
        border: 2px solid var(--cyan-soft);
        border-radius: 19px;
        box-shadow:
          inset 0 -10px 20px rgba(85, 234, 219, 0.08),
          0 0 22px rgba(85, 234, 219, 0.2);
      }

      .bot-face::before {
        position: absolute;
        top: 19px;
        left: 15px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--cyan);
        box-shadow: 20px 0 0 var(--cyan);
        content: "";
      }

      .bot-face::after {
        position: absolute;
        right: 16px;
        bottom: 14px;
        left: 16px;
        height: 4px;
        border-radius: 999px;
        background: #d8f6ff;
        content: "";
      }

      .face-scan {
        position: absolute;
        top: -24px;
        right: 4px;
        left: 4px;
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          transparent,
          rgba(85, 234, 219, 0.72),
          rgba(255, 255, 255, 0.88),
          transparent
        );
        box-shadow: 0 0 18px rgba(85, 234, 219, 0.86);
        opacity: 0.9;
        animation: face-scan 2.25s ease-in-out infinite;
      }

      @keyframes face-scan {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0;
        }

        12%,
        88% {
          opacity: 0.9;
        }

        50% {
          transform: translateY(86px);
        }
      }

      .eyebrow {
        margin: 32px 0 18px;
        color: var(--cyan);
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(56px, 6vw, 82px);
        line-height: 0.95;
      }

      .subtitle {
        margin: 24px 0 42px;
        color: #c4d4db;
        font-size: clamp(20px, 2vw, 25px);
      }

      .role-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .role-card {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 22px;
        min-height: 154px;
        border: 1px solid rgba(214, 241, 244, 0.14);
        border-radius: 8px;
        padding: 28px;
        color: inherit;
        text-decoration: none;
        background: rgba(188, 232, 216, 0.1);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .role-card:hover {
        transform: translateY(-2px);
        border-color: rgba(85, 234, 219, 0.62);
        background: rgba(188, 232, 216, 0.16);
      }

      .role-icon {
        display: grid;
        width: 68px;
        height: 68px;
        place-items: center;
        border-radius: 8px;
        color: #062827;
        background: linear-gradient(135deg, #4ce5d3, #89f6ed);
        font-size: 30px;
        font-weight: 950;
      }

      .role-card:nth-child(2) .role-icon {
        background: linear-gradient(135deg, #77d3fb, #a9fbf2);
      }

      .role-card h2 {
        margin: 0 0 8px;
        font-size: clamp(27px, 2.5vw, 34px);
      }

      .role-card p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.45;
      }

      @media (max-width: 820px) {
        main {
          place-items: start center;
          padding-top: 24px;
        }

        .home-panel {
          padding: 26px;
        }

        .role-grid {
          grid-template-columns: 1fr;
        }

        .role-card {
          min-height: 128px;
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="home-panel" aria-labelledby="home-title">
        <div class="bot-mark" aria-hidden="true">
          <div class="bot-face"><span class="face-scan"></span></div>
        </div>
        <p class="eyebrow">Access control system</p>
        <h1 id="home-title">DeepFace</h1>
        <p class="subtitle">Choose your role to continue to the right workspace.</p>
        <div class="role-grid">
          <a class="role-card" href="/admin/">
            <span class="role-icon">A</span>
            <span>
              <h2>ADMIN</h2>
              <p>Manage employees, access logs, cameras, and system settings</p>
            </span>
          </a>
          <a class="role-card" href="/user/">
            <span class="role-icon">N</span>
            <span>
              <h2>Employee</h2>
              <p>Scan your face and review your access history</p>
            </span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
