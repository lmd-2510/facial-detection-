server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /user/assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location /user/ {
        try_files $uri $uri/ /index.html;
    }

    location = /user {
        return 301 /user/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
