events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        set $backend_endpoint backend:8000;
        set $frontend_home_endpoint frontend-home:80;
        set $frontend_user_endpoint frontend-user:80;
        set $frontend_admin_endpoint frontend-admin:80;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        location = /health {
            proxy_pass http://$backend_endpoint/health;
        }

        location = /metrics {
            proxy_pass http://$backend_endpoint/metrics;
        }

        location = /docs {
            proxy_pass http://$backend_endpoint/docs;
        }

        location = /openapi.json {
            proxy_pass http://$backend_endpoint/openapi.json;
        }

        location /api/ {
            rewrite ^/api/?(.*)$ /$1 break;
            proxy_pass http://$backend_endpoint;
        }

        location /admin/ {
            proxy_pass http://$frontend_admin_endpoint;
        }

        location /user/ {
            proxy_pass http://$frontend_user_endpoint;
        }

        location / {
            proxy_pass http://$frontend_home_endpoint;
        }
    }
}
